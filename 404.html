      var href = (current.getAttribute('href') || '').replace('.html', '').replace(/[^a-z0-9]/gi, '');
      if (href) document.body.classList.add('page-' + href);
    }
    // mark language-section menu items so we can grayscale non-current flags
    var inLang = false;
    var nodes = document.querySelectorAll('#layout-menu-inner > div');

        inLang = langLabels.indexOf(el.textContent.trim().toLowerCase()) !== -1;

        el.classList.add('menu-item-lang');
      }
    });
  })();
