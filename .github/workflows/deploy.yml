name: Build and deploy mesabo.github.io

# Triggered only on push to release. Builds the jemdoc source and force-pushes
# the rendered HTML to main, which is what GitHub Pages serves from.
# develop is the working branch — pushes to develop do NOT deploy.

on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write   # required to push the built site back to main

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build dependencies (poppler for PDF→PNG thumbnails)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y poppler-utils

      - name: Build site
        run: make

      - name: Deploy built site to main
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: main
          keep_files: false
          force_orphan: true
          commit_message: "deploy: ${{ github.event.head_commit.message }} (sha ${{ github.sha }})"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
